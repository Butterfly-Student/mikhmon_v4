  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: gomikhmon-postgres
    environment:
      - POSTGRES_USER=mikhmon
      - POSTGRES_PASSWORD=mikhmon
      - POSTGRES_DB=mikhmon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mikhmon
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikhmon -d mikhmon"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: gomikhmon-redis
    ports:
      - "6379:6379"
    networks:
      - mikhmon
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local

networks:
  mikhmon:
    driver: bridge
