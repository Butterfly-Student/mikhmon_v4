  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mikhmon
      - POSTGRES_PASSWORD=mikhmon
      - POSTGRES_DB=mikhmon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mikhmon

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mikhmon

volumes:
  postgres_data:

networks:
  mikhmon:
    driver: bridge
