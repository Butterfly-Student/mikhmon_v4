<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{.Title}}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="/static/fonts/font-awesome/css/font-awesome.min.css" />
    <link rel="icon" href="/static/img/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Abstract Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-sky-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-emerald-600/10 rounded-full blur-[120px]">
        </div>
    </div>

    <div
        class="w-full max-w-[420px] relative z-10 transition-all duration-700 animate-in fade-in slide-in-from-bottom-8">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-black/50 overflow-hidden">
            <!-- Header section -->
            <div class="bg-slate-50 px-10 py-12 text-center border-b border-slate-100">
                <div
                    class="w-20 h-20 bg-sky-600 rounded-2xl flex items-center justify-center text-white mx-auto shadow-xl shadow-sky-900/20 mb-6 rotate-3">
                    <i class="fa fa-lock text-3xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">MikrOps</h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">Next-Gen Management</p>
            </div>

            <!-- Login Form -->
            <div class="px-10 py-12">
                {{if .Error}}
                <div
                    class="mb-8 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center gap-3 animate-in shake duration-500">
                    <i class="fa fa-exclamation-triangle text-rose-500"></i>
                    <p class="text-xs font-bold text-rose-600 uppercase tracking-tight">{{.Error}}</p>
                </div>
                {{end}}

                <form method="POST" action="/login" class="space-y-6">
                    <div class="space-y-1.5">
                        <label
                            class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Identity</label>
                        <div class="relative group">
                            <i
                                class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sky-500 transition-colors"></i>
                            <input type="text" name="username" placeholder="Username" autofocus required
                                value="{{.Username}}"
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-4 text-sm font-bold text-slate-700 focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 outline-none transition-all placeholder:text-slate-300">
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Access
                            Key</label>
                        <div class="relative group">
                            <i
                                class="fa fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-sky-500 transition-colors"></i>
                            <input type="password" name="password" placeholder="••••••••" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-12 pr-6 py-4 text-sm font-bold text-slate-700 focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 outline-none transition-all placeholder:text-slate-300">
                        </div>
                    </div>

                    <div class="pt-4 text-center">
                        <button type="submit"
                            class="w-full py-4 bg-sky-600 hover:bg-sky-700 text-white rounded-[1.5rem] text-base font-black shadow-xl shadow-sky-900/30 transition-all flex items-center justify-center gap-3 active:scale-[0.98] group">
                            <span>Initialize Session</span>
                            <i class="fa fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
                        </button>
                        <p class="mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Unauthorized
                            Access is Prohibited</p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-8 text-center text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] opacity-50">
            Powered by MikrOps Core Engine V4.0
        </div>
    </div>
</body>

</html>
