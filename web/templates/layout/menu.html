{{define "menu"}}
<!-- Sidebar -->
<nav id="sidebar"
        class="bg-slate-900 w-64 min-h-screen fixed md:relative z-40 transition-all duration-300 transform -translate-x-full md:translate-x-0 overflow-y-auto no-scrollbar shadow-xl">
        <div class="p-6 text-center">
                <h1 class="text-white text-2xl font-bold tracking-widest mb-4">MIKHMON</h1>
                <div class="flex justify-center mb-6">
                        <div
                                class="w-20 h-20 rounded-full border-4 border-slate-700 bg-slate-800 p-2 overflow-hidden shadow-inner">
                                <img src="/static/img/favicon.png" alt="Logo"
                                        class="w-full h-full object-contain opacity-90">
                        </div>
                </div>
        </div>

        <div class="px-4 pb-10 space-y-1">
                {{if .Session}}
                <p class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Session: {{.Session}}
                </p>

                <a href="/{{.Session}}/dashboard"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `dashboard` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-th-large w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Dashboard</span>
                </a>

                <a href="/{{.Session}}/hotspot"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `hotspot` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-wifi w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Hotspot</span>
                </a>

                <a href="/{{.Session}}/log"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `log` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-file-text w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Log</span>
                </a>

                <a href="/{{.Session}}/report"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `report` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-money w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Report</span>
                </a>

                <a href="/{{.Session}}/live-report"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `livereport` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-bar-chart w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Live Report</span>
                </a>

                <a href="/{{.Session}}/generate"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `generate` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-ticket w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Generate</span>
                </a>

                <div class="pt-4 mt-4 border-t border-slate-800"></div>

                <a href="/admin/settings"
                        class="flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors group">
                        <i class="fa fa-gear w-6 text-center group-hover:rotate-45 transition-transform"></i>
                        <span class="ml-3 font-medium">Settings</span>
                </a>

                <div class="flex items-center px-4 py-3 text-slate-500 text-sm">
                        <i class="fa fa-hourglass-half w-6 text-center"></i>
                        <span class="ml-3 font-mono" id="timer">10:00</span>
                </div>

                {{else}}
                <p class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Administration</p>

                <a href="/admin/settings"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `settings` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-gear w-6 text-center group-hover:rotate-45 transition-transform"></i>
                        <span class="ml-3 font-medium">Settings</span>
                </a>

                <a href="/admin/template-editor"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `editor` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-edit w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">Template Editor</span>
                </a>

                <a href="/admin/about"
                        class="flex items-center px-4 py-3 rounded-lg transition-colors group {{if eq .Active `about` }}bg-sky-600 text-white shadow-lg shadow-sky-900/20{{else}}text-slate-400 hover:bg-slate-800 hover:text-white{{end}}">
                        <i class="fa fa-info-circle w-6 text-center group-hover:scale-110 transition-transform"></i>
                        <span class="ml-3 font-medium">About</span>
                </a>
                {{end}}

                <div class="pt-4 mt-4 border-t border-slate-800/50"></div>

                <button id="logOut"
                        class="w-full flex items-center px-4 py-3 rounded-lg text-rose-400 hover:bg-rose-500/10 hover:text-rose-300 transition-colors group mt-4">
                        <i class="fa fa-sign-out w-6 text-center group-hover:translate-x-1 transition-transform"></i>
                        <span class="ml-3 font-medium">Sign Out</span>
                </button>
        </div>
</nav>

<!-- Mobile Overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

<!-- Mobile Header/Toggle -->
<div class="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <span class="font-bold tracking-widest">MIKHMON</span>
        <button id="sidebar-toggle" class="p-2 rounded-lg hover:bg-slate-800 transition-colors">
                <i class="fa fa-bars text-xl"></i>
        </button>
</div>

<script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggle = document.getElementById('sidebar-toggle');

        if (toggle) {
                toggle.addEventListener('click', () => {
                        sidebar.classList.toggle('-translate-x-full');
                        overlay.classList.toggle('hidden');
                });
        }

        if (overlay) {
                overlay.addEventListener('click', () => {
                        sidebar.classList.add('-translate-x-full');
                        overlay.classList.add('hidden');
                });
        }
</script>
{{end}}
